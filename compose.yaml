services:
  postgres:
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-motion}
      POSTGRES_USER: ${POSTGRES_USER:-motion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18 stores PGDATA below this directory.
      - motion-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.0
    restart: unless-stopped
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}
      # Tokens must use an issuer that the browser can resolve.
      KC_HOSTNAME: http://localhost:${KEYCLOAK_HOST_PORT:-8180}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HOST_PORT:-8180}:8080"
    volumes:
      - ./infra/keycloak/motion-local-realm.json:/opt/keycloak/data/import/motion-local-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200' <&3"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-motion}
      DB_USER: ${POSTGRES_USER:-motion}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      # Issuer remains public; JWK retrieval stays inside the Compose network.
      OIDC_ISSUER_URI: http://localhost:${KEYCLOAK_HOST_PORT:-8180}/realms/motion-local
      OIDC_JWK_SET_URI: http://keycloak:8080/realms/motion-local/protocol/openid-connect/certs
      OIDC_AUDIENCE: motion-api
      OIDC_CLIENT_ID: motion-web
      EXERCISE_IMPORT_ARTIFACT_DIR: /var/lib/moves/exercise-import
    volumes:
      - motion-exercise-import:/var/lib/moves/exercise-import
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        KEYCLOAK_URL: http://localhost:${KEYCLOAK_HOST_PORT:-8180}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:8080"
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  motion-postgres:
  motion-exercise-import:
