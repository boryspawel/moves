services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: motion
      POSTGRES_USER: motion
      POSTGRES_PASSWORD: motion-local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motion -d motion"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - motion-postgres:/var/lib/postgresql/data

  keycloak:
    image: keycloak/keycloak:26.4
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak/motion-local-realm.json:/opt/keycloak/data/import/motion-local-realm.json:ro

volumes:
  motion-postgres:
