spring:
  application:
    name: motion-ecosystem
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/motion}
    username: ${DB_USER:motion}
    password: ${DB_PASSWORD:motion-local}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8180/realms/motion-local}
          jwk-set-uri: ${OIDC_JWK_SET_URI:http://localhost:8180/realms/motion-local/protocol/openid-connect/certs}

security:
  oauth2:
    audience: ${OIDC_AUDIENCE:motion-api}
    client-id: ${OIDC_CLIENT_ID:motion-web}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
